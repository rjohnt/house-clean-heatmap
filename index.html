<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>House Cleaning Heatmap</title>
  <meta name="theme-color" content="#0f766e" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>🏠 House Cleaning Heatmap</h1>
    <p>Auto-refreshes from tracker data. Update room status and this map updates after sync.</p>
    <p id="updatedAt" class="muted"></p>
  </header>

  <main class="layout">
    <section class="card">
      <h2>Floor Plan</h2>
      <div class="legend">
        <span><i class="dot g"></i>&lt;24h</span>
        <span><i class="dot y"></i>1–3d</span>
        <span><i class="dot o"></i>3–7d</span>
        <span><i class="dot r"></i>7+d</span>
        <span><i class="dot n"></i>Never</span>
      </div>
      <div class="plan-wrap" id="planWrap">
        <img src="assets/floorplan.jpg" alt="House floor plan" class="plan" />
        <svg class="room-overlay" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          <!-- Top / center rooms -->
          <polygon class="room-zone n" data-room="Living Room" points="33,18 58,18 60,28 56,37 35,37 31,28">
            <title>Living Room</title>
          </polygon>
          <polygon class="room-zone n" data-room="Kitchen" points="58,36 81,36 84,48 82,61 62,62 57,50">
            <title>Kitchen</title>
          </polygon>
          <polygon class="room-zone n" data-room="Rotunda" points="48,40 54,40 57,45 54,50 48,50 45,45">
            <title>Rotunda</title>
          </polygon>
          <polygon class="room-zone n" data-room="Dining Room" points="65,63 80,63 83,69 79,75 67,75 62,70">
            <title>Dining Room</title>
          </polygon>

          <!-- Bathrooms / bedrooms -->
          <polygon class="room-zone n" data-room="Hall Bathroom" points="47,57 55,57 56,66 48,67 45,62">
            <title>Hall Bathroom</title>
          </polygon>
          <polygon class="room-zone n" data-room="Master Bathroom" points="75,29 84,29 85,40 79,44 73,40 73,33">
            <title>Master Bathroom</title>
          </polygon>
          <polygon class="room-zone n" data-room="Bedroom 1" points="24,37 43,37 45,48 42,56 26,56 21,48">
            <title>Bedroom 1</title>
          </polygon>
          <polygon class="room-zone n" data-room="Bedroom 2" points="24,57 42,57 44,67 40,75 25,75 21,66">
            <title>Bedroom 2</title>
          </polygon>

          <!-- Bottom rooms -->
          <polygon class="room-zone n" data-room="Office" points="68,78 84,78 86,87 82,94 70,94 66,86">
            <title>Office</title>
          </polygon>
          <polygon class="room-zone n" data-room="Laundry Room" points="51,76 58,76 60,86 57,92 50,91 48,83">
            <title>Laundry Room</title>
          </polygon>
        </svg>
      </div>
    </section>

    <section class="card">
      <h2>Room Status</h2>
      <div id="roomList" class="room-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

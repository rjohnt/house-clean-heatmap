<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>House Cleaning Heatmap</title>
  <meta name="theme-color" content="#0f766e" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>🏠 House Cleaning Heatmap</h1>
    <p>Auto-refreshes from tracker data. Update room status and this map updates after sync.</p>
    <p id="updatedAt" class="muted"></p>
  </header>

  <main class="layout">
    <section class="card">
      <h2>Floor Plan</h2>
      <div class="legend">
        <span><i class="dot g"></i>&lt;24h</span>
        <span><i class="dot y"></i>1–3d</span>
        <span><i class="dot o"></i>3–7d</span>
        <span><i class="dot r"></i>7+d</span>
        <span><i class="dot n"></i>Never</span>
      </div>
      <div class="plan-wrap" id="planWrap">
        <img src="assets/floorplan.jpg" alt="House floor plan" class="plan" />
        <svg class="room-overlay" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          <!-- Top / center rooms (3rd-pass geometry) -->
          <polygon class="room-zone n" data-room="Living Room" points="43.5,16.0 54.6,16.0 55.0,21.4 54.8,29.0 45.0,29.0 43.8,24.8">
            <title>Living Room</title>
          </polygon>
          <polygon class="room-zone n" data-room="Kitchen" points="55.5,36.5 65.2,36.5 65.5,42.0 65.5,52.6 56.2,52.6 55.5,47.2">
            <title>Kitchen</title>
          </polygon>
          <polygon class="room-zone n" data-room="Rotunda" points="52.3,27.6 56.4,27.6 57.1,33.1 56.2,38.7 52.8,38.7 51.8,32.8">
            <title>Rotunda</title>
          </polygon>
          <polygon class="room-zone n" data-room="Dining Room" points="56.6,52.5 66.8,52.5 67.4,58.3 67.4,66.0 61.6,67.0 56.6,64.2">
            <title>Dining Room</title>
          </polygon>

          <!-- Bathrooms / bedrooms -->
          <polygon class="room-zone n" data-room="Hall Bathroom" points="49.3,40.8 53.6,40.8 54.2,46.6 53.2,50.4 49.3,49.4">
            <title>Hall Bathroom</title>
          </polygon>
          <polygon class="room-zone n" data-room="Master Bathroom" points="62.2,30.2 67.5,30.2 67.8,35.5 67.1,40.8 62.8,40.8 62.2,35.8">
            <title>Master Bathroom</title>
          </polygon>
          <polygon class="room-zone n" data-room="Bedroom 1" points="42.0,33.9 50.8,33.9 51.3,40.1 50.7,48.4 42.8,48.4 42.0,42.1">
            <title>Bedroom 1</title>
          </polygon>
          <polygon class="room-zone n" data-room="Bedroom 2" points="41.5,48.4 50.2,48.4 50.8,53.9 50.4,61.5 42.3,61.5 41.5,56.0">
            <title>Bedroom 2</title>
          </polygon>

          <!-- Bottom rooms -->
          <polygon class="room-zone n" data-room="Office" points="58.2,66.4 66.6,66.4 67.0,72.4 66.8,82.8 59.4,82.8 58.2,76.8">
            <title>Office</title>
          </polygon>
          <polygon class="room-zone n" data-room="Laundry Room" points="50.3,52.5 54.4,52.5 54.7,57.4 54.5,65.0 51.0,65.0 50.3,59.1">
            <title>Laundry Room</title>
          </polygon>
        </svg>
      </div>
    </section>

    <section class="card">
      <h2>Room Status</h2>
      <div id="roomList" class="room-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
